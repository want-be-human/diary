name: diary_app
description: "个人日记与项目日志管理 App — Flutter 跨端 (Android + Windows)。"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0

  # Google 登录 & Drive
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2

  # 富文本编辑器
  flutter_quill: ^11.0.0

  # 本地数据库（全文搜索 + 离线缓存）
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 视频播放
  video_player: ^2.9.2
  youtube_player_flutter: ^9.1.1

  # 路由
  go_router: ^14.8.1

  # 导出（zip + MD/HTML）
  archive: ^3.6.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 动画
  animations: ^2.0.11

  # 偏好持久化（主题模式）
  shared_preferences: ^2.3.5

  # Windows 端 FFI：在进程启动时注入 HTTPS_PROXY 给 Firebase C++ SDK 的 curl 用
  ffi: ^2.1.3

  # 图片选择：Android 走 image_picker（系统相册/相机），Windows 走 file_picker
  # （image_picker 不支持桌面端）。两个包按 Platform 在运行时分支选用，实际产物里一起带上。
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # 网络图片缓存：内存 + 磁盘 LRU，第二次渲染从本地读取，秒开。
  # 用于渲染 Drive 上传的图片缩略图（drive.google.com/thumbnail?id=...）。
  cached_network_image: ^3.4.1

  # 位置：Android/iOS 走系统 GPS，Windows 走 Windows.Devices.Geolocation
  # （Wi-Fi/IP 粗略定位，需用户授权一次）。
  geolocator: ^13.0.1
  # 反向地理编码：lat/lng → 城市/地区名。仅 Android/iOS 支持，
  # Windows 平台没有原生实现，会在 LocationService 里 fallback 到
  # BigDataCloud 的免费 HTTP 反查 API（无 key、走 HTTPS_PROXY）。
  geocoding: ^3.0.0

  # 调系统默认浏览器/Drive App 打开外部链接（视频卡片点击后打开 Drive 预览页）。
  # 跨端：Android intent、Windows ShellExecute、iOS UIApplication.openURL。
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  fonts:
    # 衬线英文（Fraunces 72pt）：Regular + 真实 Italic 字形
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Regular.ttf
        - asset: assets/fonts/Fraunces-Italic.ttf
          style: italic

    # 永远 italic 的 Fraunces 副本——给"英文要斜体、中文要正体"的混排用：
    # fontFamily 设这个 + fallback 到 NotoSerifSC，Flutter 不会对中文做
    # synthetic italic（那样会把 Noto Serif SC 强行倾斜，很丑）。
    - family: FrauncesItalic
      fonts:
        - asset: assets/fonts/Fraunces-Italic.ttf

    # 中文衬线（Noto Serif SC Regular）
    - family: NotoSerifSC
      fonts:
        - asset: assets/fonts/NotoSerifSC-Regular.ttf
